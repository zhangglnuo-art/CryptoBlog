# Pages CMS 配置（https://pagescms.org）。
# 字段与 src/content.config.ts 的 frontmatter 一一对应。
# 在 app.pagescms.org 里写文/发布 → 提交到本仓库 → Vercel 自动构建部署。

media:
  input: public/covers # 封面等图片存放目录
  output: /covers # 页面里引用的路径前缀

content:
  - name: posts
    label: 博客文章
    type: collection
    path: src/content/blog
    filename: '{fields.slug}.md' # 新文件名取自「英文短链」字段
    view:
      fields: [title, pubDate, draft, featured]
    fields:
      - name: title
        label: 标题
        type: string
        description: 建议 ≤70 字，含主关键词，利于搜索结果完整展示
        pattern:
          regex: '^[\s\S]{1,70}$'
          message: 标题需 ≤70 字
      - name: slug
        label: 英文短链（URL）
        type: string
        description: 只用小写字母、数字、连字符，如 cross-chain-guide；这会成为文章网址
        pattern:
          regex: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
          message: 只能包含小写字母、数字和连字符
      - name: description
        label: 摘要
        type: text
        description: 20–160 字，作为搜索结果与列表里的描述，直接影响点击率
        pattern:
          regex: '^[\s\S]{20,160}$'
          message: 摘要需 20–160 字（利于 SEO）
      - name: pubDate
        label: 发布日期
        type: date
        options:
          format: yyyy-MM-dd
      - name: updatedDate
        label: 更新日期（可选）
        type: date
        required: false
        options:
          format: yyyy-MM-dd
      - name: tags
        label: 标签
        type: string
        list: true
        default: [加密货币]
        description: 第一个作为主关键词，会自动生成对应标签页
      - name: cover
        label: 封面图（可选）
        type: image
        required: false
        description: 建议 1200×630；仅显示在文章页顶部，列表为纯文字编号索引
      - name: author
        label: 作者
        type: string
        default: 编辑部
      - name: featured
        label: 首页置顶
        type: boolean
        default: false
      - name: draft
        label: 存为草稿（不发布）
        type: boolean
        default: false
      - name: body
        label: 正文
        type: rich-text
